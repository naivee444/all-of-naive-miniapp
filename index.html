<script>
const tg=window.Telegram?.WebApp; tg?.ready(); tg?.expand(); tg?.setHeaderColor?.('#172331'); tg?.setBackgroundColor?.('#0057b6');
const qs=s=>document.querySelector(s); const BOT_USERNAME='AllOfNaive_bot';
const API_DEFAULT='https://all-of-naive-backend.onrender.com';
const API_FROM_URL=new URLSearchParams(location.search).get('api');
if(API_FROM_URL){localStorage.setItem('AON_API_BASE', API_FROM_URL.replace(/\/$/,''));}
const API_BASE=(API_FROM_URL || localStorage.getItem('AON_API_BASE') || API_DEFAULT).replace(/\/$/,'');
let lang='ru', selected='m1', promoDiscount=0, promoCode='';
let plans={m1:{months:1,price:2790},m3:{months:3,price:6990},m6:{months:6,price:11990},forever:{months:120,price:14990}};
const icons=['p-cam','p-chat','p-star','p-ae','p-key','p-file','p-music','p-globe','p-pack'];
const L={ru:{lang:'RU',buyLaunch:'приобрести.exe',subTab:'Подписка',profileTab:'Профиль',profileHeader:'Профиль пользователя',profileSub:'данные из Telegram',pf1:'Ник',pf2:'Telegram ID',pf3:'Подписка',pf4:'Статус',pfPlan:'У вас нет активной подписки',pfStatus:'не бро',buyWindow:'купить.exe',modalLead:'Выбери период доступа и способ оплаты',promoPlaceholder:'введите промокод, если есть',noPromo:'Такого промокода нет',promoOk:'Промокод применён',checking:'проверяю промокод.exe',trial:'Триал-доступ',sent:'запрос отправлен в бот.exe — проверь чат',openBot:'открываю бота.exe',agree:'Оплачивая подписку, вы принимаете условия публичной оферты, политики обработки персональных данных и правила доступа к информационному продукту.',sum:'Итоговая сумма формируется с учетом условий платежной системы.',discount:'Скидка',benefit:'Выгода',payRub:'Оплатить в RUB',payCrypto:'Оплатить криптой',hero:['Туториалы с моим подходом — понятно, без воды и только практика','Поддержка от меня — помощь, ответы и советы по вашим работам','Регулярные разборы ваших работ и обратная связь','Разные фишечки и лайфхаки в After Effects и плагиных','Плагины, которыми я сам пользуюсь + секреты работы с ними','AE-файлы, референсы, коллекты и полезные материалы','Музыка и саунды для ваших видео','Полезные сайты и инструменты для работы','Эксклюзивные паки и материалы только для участников'],periods:{m1:'1 месяц',m3:'3 месяца',m6:'6 месяцев',forever:'Навсегда'},notes:{m1:'базовый доступ',m3:'выгоднее месяца',m6:'полное погружение',forever:'10 лет доступа'},legal:'<b>Оферта и конфиденциальность.</b> Оплата является акцептом публичной оферты по ст. 435, 437, 438 ГК РФ. Предмет — предоставление доступа к закрытым обучающим материалам и комьюнити по монтажу видео в формате подписки. Доступ предоставляется «как есть» в объеме, доступном на дату оплаты и в течение выбранного срока. После предоставления доступа услуга считается начатой/оказанной в части предоставления доступа; возврат за уже предоставленный доступ не производится, за исключением случаев, прямо предусмотренных законом, включая наличие существенных недостатков услуги. При отказе заказчика применяются ст. 782 ГК РФ и ст. 32 Закона РФ «О защите прав потребителей»: исполнитель вправе удержать стоимость фактически оказанных услуг и понесенных расходов. Персональные данные Telegram ID, username, имя, сведения о платеже и подписке обрабатываются только для авторизации, выдачи доступа, учета оплаты, поддержки и исполнения требований закона. Данные не продаются третьим лицам.'},ua:{lang:'UA',buyLaunch:'придбати.exe',subTab:'Підписка',profileTab:'Профіль',profileHeader:'Профіль користувача',profileSub:'дані з Telegram',pf1:'Нік',pf2:'Telegram ID',pf3:'Підписка',pf4:'Статус',pfPlan:'У вас немає активної підписки',pfStatus:'не бро',buyWindow:'купити.exe',modalLead:'Обери період доступу і спосіб оплати',promoPlaceholder:'введіть промокод, якщо є',noPromo:'Такого промокоду немає',promoOk:'Промокод застосовано',checking:'перевіряю промокод.exe',trial:'Тріал-доступ',sent:'запит надіслано в бот.exe — перевір чат',openBot:'відкриваю бота.exe',agree:'Оплачуючи підписку, ви приймаєте умови публічної оферти, політики обробки персональних даних і правила доступу до інформаційного продукту.',sum:'Підсумкова сума формується з урахуванням умов платіжної системи.',discount:'Знижка',benefit:'Вигода',payRub:'Оплатити в RUB',payCrypto:'Оплатити криптою',hero:['Туторіали з моїм підходом — зрозуміло, без води і тільки практика','Підтримка від мене — допомога, відповіді та поради щодо ваших робіт','Регулярні розбори ваших робіт і зворотний зв’язок','Фішки та лайфхаки в After Effects і плагінах','Плагіни, якими я сам користуюсь + секрети роботи з ними','AE-файли, референси, колекти та корисні матеріали','Музика і саунди для ваших відео','Корисні сайти та інструменти для роботи','Ексклюзивні паки та матеріали тільки для учасників'],periods:{m1:'1 місяць',m3:'3 місяці',m6:'6 місяців',forever:'Назавжди'},notes:{m1:'базовий доступ',m3:'вигідніше місяця',m6:'повне занурення',forever:'10 років доступу'},legal:'<b>Оферта і конфіденційність.</b> Оплата є акцептом публічної оферти за ст. 435, 437, 438 ЦК РФ. Предмет — доступ до закритих навчальних матеріалів і комʼюніті з монтажу відео у форматі підписки. Доступ надається «як є» в обсязі, доступному на дату оплати та протягом обраного строку. Після надання доступу послуга вважається розпочатою/наданою в частині доступу; повернення за вже наданий доступ не здійснюється, крім випадків, прямо передбачених законом. Персональні дані Telegram ID, username, імʼя, дані платежу і підписки обробляються для авторизації, доступу, обліку оплати, підтримки та виконання вимог закону.'}};
function money(n){return (Math.round(n)).toLocaleString('ru-RU')+' ₽'}
function finalPrice(){return Math.max(1, Math.round(plans[selected].price*(100-promoDiscount)/100))}
function toast(t){const e=qs('#toast'); e.textContent=t; e.classList.add('show'); clearTimeout(window.__t); window.__t=setTimeout(()=>e.classList.remove('show'),2500)}
function renderHero(){qs('#heroList').innerHTML=L[lang].hero.map((t,i)=>`<div class="hero-item"><span class="pix ${icons[i]||'p-file'}"></span><span>${t}</span></div>`).join('')}
function calcBenefit(id){if(id==='m1')return 0; const base=plans.m1.price*(plans[id].months||1); return Math.max(0, Math.round((1-plans[id].price/base)*100))}
function renderPlans(){qs('#plans').innerHTML=['m1','m3','m6','forever'].map(id=>`<button class="period ${selected===id?'sel':''}" data-id="${id}"><span>${L[lang].periods[id]}</span><small>${L[lang].notes[id]}</small></button>`).join(''); document.querySelectorAll('.period').forEach(b=>b.onclick=()=>{selected=b.dataset.id; renderPlans(); updatePrice()}); updatePrice()}
function updatePrice(){qs('#bigPrice').textContent=money(finalPrice()); const benefit=calcBenefit(selected); const d=promoDiscount||benefit; const badge=qs('#discountBadge'); badge.classList.add('show'); badge.textContent=(promoDiscount?L[lang].discount:L[lang].benefit)+' '+d+'%'}
function applyText(){qs('#langBtn').textContent=L[lang].lang; qs('#buyLaunchText').textContent=L[lang].buyLaunch; qs('#subTabText').textContent=L[lang].subTab; qs('#profileTabText').textContent=L[lang].profileTab; qs('#profileHeader').textContent=L[lang].profileHeader; qs('#profileSub').textContent=L[lang].profileSub; qs('#pfLbl1').textContent=L[lang].pf1; qs('#pfLbl2').textContent=L[lang].pf2; qs('#pfLbl3').textContent=L[lang].pf3; qs('#pfLbl4').textContent=L[lang].pf4; qs('#pfPlan').textContent=L[lang].pfPlan; qs('#pfStatus').textContent=L[lang].pfStatus; qs('#buyWindowTitle').textContent=L[lang].buyWindow; qs('#modalLead').textContent=L[lang].modalLead; qs('#promo').placeholder=L[lang].promoPlaceholder; qs('#agreeText').textContent=L[lang].agree; qs('#sumNote').textContent=L[lang].sum; qs('#yooText').textContent=L[lang].payRub; qs('#cryptoText').textContent=L[lang].payCrypto; qs('#trialText').textContent=L[lang].trial; qs('#legalText').innerHTML=L[lang].legal; renderHero(); renderPlans()}
async function loadPlans(){ if(!API_BASE) return; try{const r=await fetch(API_BASE+'/api/plans'); const arr=await r.json(); arr.forEach(p=>{if(plans[p.id]) plans[p.id].price=p.price_rub}); renderPlans()}catch(e){}}
async function checkPromo(){const code=qs('#promo').value.trim().toUpperCase(); promoCode=code; qs('#promoMsg').textContent=''; if(!code){promoDiscount=0; updatePrice(); return} if(API_BASE){try{const r=await fetch(API_BASE+'/api/promo/check?code='+encodeURIComponent(code)); const j=await r.json(); if(j.ok){promoDiscount=j.discount_percent; qs('#promoMsg').style.color='#0b7f00'; qs('#promoMsg').textContent=L[lang].promoOk+': -'+promoDiscount+'%'} else {promoDiscount=0; qs('#promoMsg').style.color='#b40000'; qs('#promoMsg').textContent=L[lang].noPromo} updatePrice(); return}catch(e){}} promoDiscount=0; updatePrice(); qs('#promoMsg').style.color='#7a5200'; qs('#promoMsg').textContent=lang==='ru'?'Промокод проверится ботом при оплате':'Промокод перевірить бот під час оплати'}
function openBotFallback(action,payload={}){const provider=payload.provider||'yookassa'; const promo=(payload.promo||'').trim(); const startArg=action==='trial'?'trial':`buy_${selected}_${provider}${promo?`_promo_${encodeURIComponent(promo)}`:''}`; const url=`https://t.me/${BOT_USERNAME}?start=${startArg}`; toast(L[lang].openBot); setTimeout(()=>{if(tg?.openTelegramLink)tg.openTelegramLink(url);else location.href=url},350)}
async function send(action,extra={},close=true){
  const payload={action,plan_id:selected,promo:qs('#promo').value.trim(),...extra};
  if(close) closeModal();
  if(action==='trial'){
    openBotFallback(action,payload);
    return;
  }
  if(!tg?.initData){
    toast(lang==='ru'?'Открой приложение через кнопку в Telegram':'Відкрий застосунок через кнопку в Telegram');
    openBotFallback(action,payload);
    return;
  }
  if(!API_BASE){
    openBotFallback(action,payload);
    return;
  }
  try{
    toast(lang==='ru'?'создаю платеж.exe':'створюю платіж.exe');
    const r=await fetch(API_BASE+'/api/payments/create',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({initData:tg.initData, plan_id:selected, provider:payload.provider, promo:payload.promo, accepted_legal:agree})
    });
    const j=await r.json();
    if(!r.ok || !j.ok){ throw new Error(j.detail || 'payment_error'); }
    toast(lang==='ru'?'платеж создан — проверь чат с ботом':'платіж створено — перевір чат із ботом');
    if(j.checkout_url && tg?.openLink){ setTimeout(()=>tg.openLink(j.checkout_url), 500); }
  }catch(e){
    toast(lang==='ru'?'ошибка платежа, открою бота.exe':'помилка платежу, відкрию бота.exe');
    openBotFallback(action,payload);
  }
}
function openModal(){qs('#buyModal').classList.remove('hide'); qs('#buyModal').classList.add('show')}function closeModal(){const m=qs('#buyModal'); if(!m.classList.contains('show'))return; m.classList.add('hide'); setTimeout(()=>{m.classList.remove('show','hide')},240)}
function switchScreen(name){if(name==='profile') closeModal(); const sub=name==='sub'; qs('#subScreen').classList.toggle('show',sub); qs('#profileScreen').classList.toggle('show',!sub); qs('#subTab').classList.toggle('active',sub); qs('#profileTab').classList.toggle('active',!sub)}

let agree=false;
function updateAgree(){ qs('#agreeCheck').classList.toggle('on', agree); qs('#payYoo').disabled=!agree; qs('#payCrypto').disabled=!agree; }
qs('#agreeCheck').onclick=()=>{agree=!agree; updateAgree()};
async function loadProfile(){
  const noSub=lang==='ru'?'У вас нет активной подписки':'У вас немає активної підписки';
  const notBro='не бро';
  qs('#pfPlan').textContent=noSub; qs('#pfStatus').textContent=notBro;
  if(!API_BASE || !tg?.initData) return;
  try{
    const r=await fetch(API_BASE+'/api/profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({initData:tg.initData})});
    const j=await r.json();
    if(j.subscription && j.subscription.active){
      const d=new Date(j.subscription.expires_at);
      qs('#pfPlan').innerHTML=(j.subscription.plan_title||j.subscription.plan_id)+'<br>до '+d.toLocaleString('ru-RU');
      qs('#pfStatus').textContent='мой бро';
    }
  }catch(e){}
}
updateAgree();
qs('#openBuy').onclick=openModal; qs('#closeBuy').onclick=closeModal; qs('#buyModal').onclick=e=>{if(e.target.id==='buyModal')closeModal()}; qs('#checkPromo').onclick=checkPromo; qs('#payYoo').onclick=()=>send('buy',{provider:'yookassa'}); qs('#payCrypto').onclick=()=>send('buy',{provider:'cryptobot'}); qs('#trialBtn').onclick=()=>send('trial'); qs('#subTab').onclick=()=>switchScreen('sub'); qs('#profileTab').onclick=()=>{switchScreen('profile'); loadProfile()}; qs('#langBtn').onclick=()=>{lang=lang==='ru'?'ua':'ru'; applyText(); loadProfile()};
const u=tg?.initDataUnsafe?.user||{}; qs('#pfName').textContent=u.username?'@'+u.username:(u.first_name||'unknown'); qs('#pfId').textContent=u.id||'—'; if(u.photo_url){qs('#avatar').innerHTML=`<img src="${u.photo_url}" alt="avatar">`}
applyText(); loadPlans(); loadProfile();
</script>
